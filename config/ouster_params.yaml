ouster/os_driver:
  ros__parameters:
    sensor_hostname: '192.168.4.4'
    # INTERNAL_OSC: PTP won't lock (switch/HW issue), so use the sensor's stable
    # internal crystal. A recal node uses the 100 Hz IMU to map internal→wall-clock
    # and restamps IMU (for EKF) + provides the offset to the compositor (for lidar).
    timestamp_mode: 'TIME_FROM_INTERNAL_OSC'
    # 2048x10: highest azimuth resolution (0.18°/col) at 10 Hz. Denser cloud both
    # for the cropped normal datasets and for calibration. The azimuth window below
    # is angular (millidegrees), so it is mode-invariant; the destagger stripe-free
    # region is angular too (±11.25° at any resolution), so the FOV crop bounds in
    # the launch files stay valid. Calibration mode widens this window via the
    # launch (HITOS_CALIB) without changing the mode.
    lidar_mode: '2048x10'
    # Window centred on the camera FOV, wider than the 30° camera FOV to compensate
    # for the OS-0-128 pixel stagger (±32 cols at 1024x10). At 152000/202000 (50°) the
    # post-destagger stripe-free range was [487, 566], covering the crop cols [487, 566].
    # NOTE: encoder and the image h-convention are INVERTED — DECREASING the window
    # moves the cropped data RIGHT (+h). Was 160000/210000 (data ~7° left of cameras),
    # then 152000/202000. start lowered a further 4° (-> 148000, window now 54°) to
    # extend the saved cloud's FOV right; this only ADDS stripe-free cols on the right,
    # so the crop still clears. end kept (left edge unchanged).
    azimuth_window_start: 148000
    azimuth_window_end: 202000
    lidar_port: 7502
    imu_port: 7503
    sensor_frame: os_sensor
    lidar_frame: os_lidar
    imu_frame: os_imu
    point_cloud_frame: os_lidar
    # organized=false: publish a DENSE cloud (valid points only, ~0.85 MB) instead
    # of the full 1024x128 grid (6.29 MB, 87% zeros outside the azimuth window).
    # Lets the Python compositor receive the cloud at the full 10 Hz. Requires the
    # pointcloud_crop_node to filter by angle (not row/col index) — see that node.
    organized: false
    destagger: true
    point_type: original
    use_system_default_qos: false
    # PHC=TAI (phc2sys -O 37 -S 1.0). Driver converts TAI→UTC with -37s offset.
    ptp_utc_tai_offset: -37.0
