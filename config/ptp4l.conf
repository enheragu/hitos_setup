# ptp4l configuration for HITOS - master mode on eth0
# Cameras (192.168.4.5, 192.168.4.6) and LiDAR (169.254.252.240) are PTP slaves

[global]
clockClass              52
clockAccuracy           0x20
offsetScaledLogVariance 0xFFFF
domainNumber            0
# PHC is driven to TAI by phc2sys -O 37. PTP timestamps = TAI.
# utc_offset=37 tells PTP slaves the UTC-TAI offset so they can convert correctly.
# The Ouster driver applies ptp_utc_tai_offset=-37 to recover CLOCK_REALTIME.
utc_offset              37
priority1               50
priority2               50
# NOTE (2026-06-12): raising sync rate to 8/s (logSyncInterval -3) was tested
# and did NOT make the A68 servo lock (stayed "Synchronizing") — reverted to
# the long-proven values. The A68 lock issue is not the sync rate.
logAnnounceInterval     1
logSyncInterval         0
logMinDelayReqInterval  0
announceReceiptTimeout  3
syncReceiptTimeout      0
transportSpecific       0x0
twoStepFlag             1
slaveOnly               0
masterOnly              1
gmCapable               1
time_stamping           hardware
network_transport       UDPv4
tx_timestamp_timeout    10

[eth0]
